<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A clean, modern to-do app" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ====================================================
         App Shell
    ===================================================== -->
    <div class="app-wrapper">

      <!-- ── Header ─────────────────────────────────────── -->
      <header class="app-header">
        <div class="header-inner container">
          <div class="logo">
            <span class="logo-icon" aria-hidden="true">✓</span>
            <h1 class="logo-text">Taskly</h1>
          </div>
          <div class="header-actions">
            <!-- theme toggle / extra actions land here -->
          </div>
        </div>
      </header>

      <!-- ── Main Layout ────────────────────────────────── -->
      <main class="app-main container">

        <!-- Sidebar (categories / filters) -->
        <aside class="sidebar" id="sidebar" aria-label="Filters and categories">
          <nav class="sidebar-nav">
            <ul class="filter-list" id="filterList">
              <!-- populated by JS -->
            </ul>
          </nav>
          <section class="categories-section">
            <h2 class="section-title">Categories</h2>
            <ul class="category-list" id="categoryList">
              <!-- populated by JS -->
            </ul>
            <button class="btn btn-ghost btn-sm" id="addCategoryBtn">
              + Add category
            </button>
          </section>
        </aside>

        <!-- Content area -->
        <section class="content-area" aria-label="Task list">

          <!-- Task input form -->
          <div class="task-form-card card" id="taskFormCard">
            <form class="task-form" id="taskForm" novalidate>
              <input
                type="text"
                class="task-input"
                id="taskInput"
                placeholder="What needs to be done?"
                aria-label="New task title"
                autocomplete="off"
                maxlength="200"
              />
              <!-- Extra fields (due date, priority, tags) added by later tasks -->
              <div class="task-form-extras" id="taskFormExtras"></div>
              <button type="submit" class="btn btn-primary" id="addTaskBtn">
                Add Task
              </button>
            </form>
          </div>

          <!-- Toolbar: sort / filter controls -->
          <div class="toolbar" id="toolbar">
            <div class="toolbar-filters" id="toolbarFilters">
              <!-- filter pills injected by JS -->
            </div>
            <div class="toolbar-sort" id="toolbarSort">
              <!-- sort dropdown injected by JS -->
            </div>
          </div>

          <!-- Task list -->
          <ul class="task-list" id="taskList" aria-label="Tasks" aria-live="polite">
            <!-- task items injected by JS -->
          </ul>

          <!-- Empty state -->
          <div class="empty-state hidden" id="emptyState" aria-live="polite">
            <span class="empty-icon" aria-hidden="true">🎉</span>
            <p class="empty-title">All clear!</p>
            <p class="empty-subtitle">Add a task above to get started.</p>
          </div>

        </section>
      </main>

      <!-- ── Footer ─────────────────────────────────────── -->
      <footer class="app-footer">
        <div class="container">
          <p class="footer-text" id="taskCount">0 tasks remaining</p>
        </div>
      </footer>

    </div><!-- /.app-wrapper -->

    <!-- ── Modal Overlay (shared) ─────────────────────── -->
    <div class="modal-overlay hidden" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal" id="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modalTitle">Modal</h2>
          <button class="btn btn-icon modal-close" id="modalClose" aria-label="Close modal">✕</button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- dynamic content -->
        </div>
        <div class="modal-footer" id="modalFooter">
          <!-- dynamic actions -->
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
