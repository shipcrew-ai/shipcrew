# Optional: Only needed if using PostgreSQL instead of SQLite for local dev
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devteam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devteam
      POSTGRES_PASSWORD: devteam_secret
      POSTGRES_DB: devteam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devteam -d devteam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
